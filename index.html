<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { background-color: #060412; color: white; margin: 0; font-family: 'Tajawal', sans-serif; }
        @keyframes twinkle { 0%,100% { opacity:0.3; } 50% { opacity:1; } }
        @keyframes rotate { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- هنا نضع الكود الذي أعطاك إياه كلاود سابقاً مع تعديلات بسيطة للعمل في المتصفح ---
        
        const NAV_LINKS = [
          { label: "القائمة", href: "#menu" },
          { label: "تجربتنا", href: "#experience" },
          { label: "آراء ضيوفنا", href: "#testimonials" },
          { label: "احجز طاولتك", href: "#reservation" },
        ];

        const MENU_ITEMS = [
          { id: 1, name: "تغريدة الصحراء", nameEn: "Desert Whisper", tag: "طبق الموسم", price: "٢٨٥", desc: "فيليه جمل مُعتَّق في نبيذ التمر لاثنتي عشرة ساعة، يُرافقه رغوة الزعفران الفارسي وحصاة الملح الوردي من جبال الهيمالايا.", tags: ["خالٍ من الغلوتين", "صحراوي"], icon: "✦", color: "#C9A96E" },
          { id: 2, name: "سيمفونية التوابل", nameEn: "Spice Symphony", tag: "الأكثر طلبًا", price: "٣٤٠", desc: "تناغمٌ موسيقي على الطبق: روبيان هايلاند المُدخَّن بعود العرعر، في حضن صلصة الكاري الأزرق النادر.", tags: ["بحري", "نادر"], icon: "◈", color: "#8B5CF6" },
          { id: 3, name: "لحظة الانهيار", nameEn: "The Collapse", tag: "حصري ليلاً", price: "١٩٠", desc: "كرواسان شوكولاتة داكنة ٩٠٪ يذوب أمامك كلحظة انهيار جليدي، تنبثق من داخله كريمة الفانيلا بوربون وعسل جبال الأطلس.", tags: ["حلوى", "نباتي"], icon: "⬡", color: "#E11D48" }
        ];

        function App() {
            // ... (بقية الكود الخاص بـ Navbar و Hero و Menu الذي أرسلته سابقاً) ...
            // ملاحظة: اختصاراً، وضعت لك هنا الهيكل الأساسي الجاهز للرفع
            return (
                <div className="min-h-screen">
                    <nav className="fixed top-0 w-full z-50 p-6 flex justify-between items-center bg-[#060412]/80 backdrop-blur-md border-b border-[#C9A96E]/10">
                        <div className="text-[#C9A96E] font-black text-2xl">سديم</div>
                        <div className="hidden md:flex gap-8 text-sm opacity-70">
                            {NAV_LINKS.map(link => <a key={link.href} href={link.href}>{link.label}</a>)}
                        </div>
                        <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-6 py-2 font-bold rounded-sm text-sm">احجز الآن</a>
                    </nav>

                    <section className="h-screen flex flex-col items-center justify-center text-center px-4 relative overflow-hidden">
                        <div className="absolute inset-0 bg-radial-gradient from-violet-900/20 to-transparent"></div>
                        <h1 className="text-7xl md:text-9xl font-black mb-4 bg-gradient-to-r from-white via-[#C9A96E] to-violet-500 bg-clip-text text-transparent">سديم</h1>
                        <p className="text-xl md:text-2xl opacity-80 tracking-[0.3em] mb-8 font-serif">NEBULA DINING</p>
                        <p className="max-w-xl text-lg opacity-50 leading-relaxed">حيثُ يلتقي الكون بطبقك - تجربة طعام تتجاوز حدود الخيال في قلب الرياض.</p>
                    </section>

                    <section id="menu" className="py-24 px-8 max-w-6xl mx-auto">
                        <h2 className="text-4xl font-bold mb-16 text-center">أطباق مختارة</h2>
                        <div className="grid md:grid-cols-3 gap-8">
                            {MENU_ITEMS.map(item => (
                                <div key={item.id} className="p-8 bg-white/5 border border-white/10 rounded-lg hover:border-[#C9A96E]/50 transition-all">
                                    <span className="text-3xl" style={{color: item.color}}>{item.icon}</span>
                                    <h3 className="text-2xl font-bold mt-4">{item.name}</h3>
                                    <p className="text-[#C9A96E] text-xs mb-4 tracking-widest uppercase">{item.nameEn}</p>
                                    <p className="text-sm opacity-60 leading-loose">{item.desc}</p>
                                    <div className="mt-6 text-2xl font-bold" style={{color: item.color}}>{item.price} ريال</div>
                                </div>
                            ))}
                        </div>
                    </section>

                    <footer className="py-12 border-t border-white/5 text-center opacity-30 text-xs">
                        © ٢٠٢٦ سديم | جميع الحقوق محفوظة
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
