<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining - تجربة طعام استثنائية</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* التنسيقات الأساسية والحركات السحرية */
        * { scroll-behavior: smooth; box-sizing: border-box; }
        body { 
            background-color: #060412; 
            color: white; 
            font-family: 'Tajawal', sans-serif; 
            margin: 0;
            overflow-x: hidden;
        }
        
        /* تأثير السديم في الخلفية */
        .nebula-bg {
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(201, 169, 110, 0.1) 0%, transparent 40%),
                linear-gradient(to bottom, #060412, #0d0820);
            min-height: 100vh;
        }

        /* حركة النجوم */
        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle var(--duration) infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* دوران الحلقات حول الشعار */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            border: 1px solid rgba(201, 169, 110, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: rotate var(--rev) linear infinite;
            pointer-events: none;
        }
        @keyframes rotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* انسيابية ظهور العناصر */
        .fade-in { animation: fadeIn 1.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* تعديل مظهر السكرول بار */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #060412; }
        ::-webkit-scrollbar-thumb { background: #C9A96E; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- المكونات الفرعية ---

        const BackgroundStars = () => {
            const stars = Array.from({ length: 80 }).map((_, i) => ({
                id: i,
                left: Math.random() * 100 + '%',
                top: Math.random() * 100 + '%',
                size: Math.random() * 2 + 1 + 'px',
                duration: 2 + Math.random() * 4 + 's'
            }));
            return (
                <div className="fixed inset-0 pointer-events-none">
                    {stars.map(s => (
                        <div key={s.id} className="star" style={{
                            left: s.left, top: s.top, width: s.size, height: s.size, '--duration': s.duration
                        }}></div>
                    ))}
                </div>
            );
        };

        const MENU_ITEMS = [
            { id: 1, name: "تغريدة الصحراء", nameEn: "Desert Whisper", price: "٢٨٥", desc: "فيليه جمل مُعتَّق في نبيذ التمر لـ ١٢ ساعة، يُرافقه رغوة الزعفران وحصاة الملح الوردي.", color: "#C9A96E", icon: "✦", tag: "الأكثر طلباً" },
            { id: 2, name: "سيمفونية التوابل", nameEn: "Spice Symphony", price: "٣٤٠", desc: "روبيان هايلاند المُدخَّن بعود العرعر، في حضن صلصة الكاري الأزرق النادر ورقائق الذهب.", color: "#8B5CF6", icon: "◈", tag: "طبق الموسم" },
            { id: 3, name: "لحظة الانهيار", nameEn: "The Collapse", price: "١٩٠", desc: "كرواسان شوكولاتة داكنة ٩٠٪ يذوب أمامك، تنبثق منه كريمة الفانيلا بوربون وعسل جبال الأطلس.", color: "#E11D48", icon: "⬡", tag: "حصري ليلاً" }
        ];

        // --- المكون الرئيسي ---

        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="nebula-bg min-h-screen relative">
                    <BackgroundStars />
                    
                    {/* الملاحة / Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-700 px-6 md:px-16 py-5 flex justify-between items-center ${scrolled ? 'bg-[#060412]/90 backdrop-blur-xl border-b border-[#C9A96E]/20' : 'bg-transparent'}`}>
                        <div className="flex flex-col">
                            <span className="text-[#C9A96E] font-black text-3xl tracking-tighter italic">سديم</span>
                            <span className="text-[10px] tracking-[0.4em] opacity-40 uppercase font-serif">Nebula Dining</span>
                        </div>
                        <div className="hidden md:flex gap-12 text-[11px] font-bold tracking-[0.2em] opacity-60">
                            <a href="#menu" className="hover:text-[#C9A96E] transition-all">القائمة</a>
                            <a href="#experience" className="hover:text-[#C9A96E] transition-all">تجربتنا</a>
                            <a href="#reservation" className="hover:text-[#C9A96E] transition-all">احجز الآن</a>
                        </div>
                        <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-8 py-3 text-xs font-black uppercase hover:bg-white transition-all shadow-xl shadow-[#C9A96E]/10">Reserve</a>
                    </nav>

                    {/* قسم الواجهة / Hero */}
                    <header className="relative h-screen flex flex-col items-center justify-center text-center px-6 overflow-hidden">
                        <div className="orbit w-[300px] h-[300px] md:w-[700px] md:h-[700px]" style={{'--rev': '50s'}}></div>
                        <div className="orbit w-[250px] h-[250px] md:w-[500px] md:h-[500px]" style={{'--rev': '35s', animationDirection: 'reverse'}}></div>
                        
                        <div className="z-10 fade-in">
                            <span className="text-[#C9A96E] text-[10px] tracking-[0.8em] mb-8 block opacity-60 uppercase">Riyadh's Finest Culinary Art</span>
                            <h1 className="text-[80px] md:text-[160px] font-black leading-none mb-6 bg-gradient-to-b from-white via-[#E8D5B0] to-[#C9A96E] bg-clip-text text-transparent italic">سديم</h1>
                            <p className="text-sm md:text-xl font-light opacity-50 max-w-2xl mx-auto leading-loose mb-12 tracking-wide">
                                حيثُ لا يكتفي الطعام بإشباعك، بل يروي لك حكايةً من وحي المجرات.
                            </p>
                            <div className="flex gap-6 justify-center">
                                <a href="#menu" className="bg-[#C9A96E] text-[#060412] px-12 py-5 font-black text-xs hover:scale-105 transition-all">استكشف القائمة</a>
                                <a href="#reservation" className="border border-white/20 px-12 py-5 font-bold text-xs hover:bg-white/5 transition-all">احجز طاولتك</a>
                            </div>
                        </div>
                    </header>

                    {/* قسم القائمة / Menu */}
                    <section id="menu" className="py-40 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="text-center mb-24">
                            <h2 className="text-5xl md:text-7xl font-black mb-6">مختارات السديم</h2>
                            <div className="w-24 h-px bg-[#C9A96E] mx-auto opacity-40"></div>
                        </div>
                        <div className="grid lg:grid-cols-3 gap-10">
                            {MENU_ITEMS.map(item => (
                                <div key={item.id} className="group p-12 bg-white/[0.02] border border-white/5 hover:border-[#C9A96E]/40 transition-all duration-700 relative overflow-hidden backdrop-blur-md">
                                    <div className="absolute top-0 right-0 p-6 opacity-5 group-hover:opacity-20 transition-opacity text-6xl font-black">{item.id}</div>
                                    <div className="text-4xl mb-10" style={{color: item.color}}>{item.icon}</div>
                                    <span className="text-[10px] text-[#C9A96E] border border-[#C9A96E]/30 px-4 py-1.5 mb-6 inline-block tracking-widest uppercase">{item.tag}</span>
                                    <h3 className="text-3xl font-bold mb-2">{item.name}</h3>
                                    <p className="text-[11px] opacity-40 font-serif mb-6 tracking-[0.2em] uppercase">{item.nameEn}</p>
                                    <p className="text-sm opacity-50 leading-loose mb-12 h-24">{item.desc}</p>
                                    <div className="text-4xl font-black italic" style={{color: item.color}}>{item.price} <span className="text-xs font-normal opacity-30">ر.س</span></div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* قسم التجربة / Experience */}
                    <section id="experience" className="py-40 border-y border-white/5 bg-[#040310]">
                        <div className="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-24 items-center">
                            <div className="relative">
                                <div className="absolute -inset-4 border border-[#C9A96E]/20 rotate-3"></div>
                                <img src="https://images.unsplash.com/photo-1514362545857-3bc16c4c7d1b?auto=format&fit=crop&q=80" alt="Experience" className="relative z-10 grayscale hover:grayscale-0 transition-all duration-1000" />
                            </div>
                            <div>
                                <h3 className="text-[#C9A96E] text-xs font-bold tracking-[0.5em] mb-6 uppercase">فلسفتنا</h3>
                                <h2 className="text-4xl md:text-6xl font-black mb-8 leading-tight text-white">طعامٌ يلمس الروح قبل الحواس.</h2>
                                <p className="opacity-50 text-lg leading-relaxed mb-10">
                                    كل طبق في "سديم" هو نتيجة شهور من البحث عن المكونات الأكثر ندرة في شبه الجزيرة العربية، مدموجةً بتقنيات الطهي الجزيئي لتخرج لك في لوحة فنية مبهرة.
                                </p>
                                <div className="grid grid-cols-2 gap-10">
                                    <div>
                                        <div className="text-3xl font-black text-[#C9A96E]">١٠٠٪</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-widest mt-2">مكونات عضوية</div>
                                    </div>
                                    <div>
                                        <div className="text-3xl font-black text-[#C9A96E]">٢٤</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-widest mt-2">ساعة تحضير</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* قسم الحجز / Reservation */}
                    <section id="reservation" className="py-40 px-6 max-w-4xl mx-auto text-center relative z-10">
                        <div className="mb-20">
                            <h2 className="text-5xl font-black mb-4 italic">احجز رحلتك</h2>
                            <p className="opacity-40 tracking-widest uppercase text-xs">Limited seating available nightly</p>
                        </div>
                        <form className="grid grid-cols-1 md:grid-cols-2 gap-8 text-right bg-white/[0.02] p-12 border border-white/5 backdrop-blur-md">
                            <div className="flex flex-col gap-2">
                                <label className="text-[10px] uppercase opacity-40 mr-2">الاسم بالكامل</label>
                                <input type="text" className="bg-transparent border-b border-white/10 p-4 focus:border-[#C9A96E] outline-none transition-all text-sm"/>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-[10px] uppercase opacity-40 mr-2">رقم التواصل</label>
                                <input type="tel" className="bg-transparent border-b border-white/10 p-4 focus:border-[#C9A96E] outline-none transition-all text-sm text-left"/>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-[10px] uppercase opacity-40 mr-2">تاريخ الزيارة</label>
                                <input type="date" className="bg-transparent border-b border-white/10 p-4 focus:border-[#C9A96E] outline-none transition-all text-sm opacity-50"/>
                            </div>
                            <div className="flex flex-col gap-2">
                                <label className="text-[10px] uppercase opacity-40 mr-2">عدد الضيوف</label>
                                <select className="bg-transparent border-b border-white/10 p-4 focus:border-[#C9A96E] outline-none transition-all text-sm opacity-50">
                                    <option className="bg-[#060412]">٢ شخص</option>
                                    <option className="bg-[#060412]">٤ أشخاص</option>
                                    <option className="bg-[#060412]">طاولة ملكية (٦+)</option>
                                </select>
                            </div>
                            <button type="button" className="md:col-span-2 mt-8 bg-gradient-to-r from-[#C9A96E] to-[#8B5CF6] text-[#060412] p-6 font-black uppercase tracking-[0.3em] hover:scale-[1.02] transition-all shadow-2xl shadow-[#C9A96E]/20">
                                Confirm Reservation ✦
                            </button>
                        </form>
                    </section>

                    {/* التذييل / Footer */}
                    <footer className="py-20 border-t border-white/5 text-center bg-[#03020d]">
                        <div className="mb-12">
                            <div className="text-[#C9A96E] font-black text-4xl mb-2 italic">سديم</div>
                            <div className="text-[10px] opacity-30 tracking-[0.5em] uppercase font-serif">A Galaxy of Flavors</div>
                        </div>
                        <div className="flex justify-center gap-12 opacity-30 text-[10px] font-bold mb-12 tracking-widest uppercase">
                            <a href="#" className="hover:text-white transition-all">Instagram</a>
                            <a href="#" className="hover:text-white transition-all">Location</a>
                            <a href="#" className="hover:text-white transition-all">Contact</a>
                        </div>
                        <p className="text-[9px] opacity-20 max-w-xs mx-auto leading-loose">
                            © ٢٠٢٦ سديم | جميع الحقوق محفوظة. تم تصميمه ليكون الوجهة الأولى للنخبة في الرياض.
                        </p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
