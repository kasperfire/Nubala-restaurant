<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }
        body { background-color: #060412; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--dur) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .gold-text { background: linear-gradient(to bottom, #E8D5B0 0%, #C9A96E 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .reveal { opacity: 0; transform: translateY(50px); transition: all 1s cubic-bezier(0.17, 0.55, 0.55, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(201, 169, 110, 0.1); backdrop-filter: blur(10px); }
        /* العلامة المائية */
        .watermark { position: fixed; bottom: 20px; left: 20px; z-index: 999; opacity: 0.4; font-size: 10px; color: #C9A96E; letter-spacing: 2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const StarField = () => {
            const stars = Array.from({ length: 80 }).map((_, i) => ({
                id: i, left: Math.random() * 100 + '%', top: Math.random() * 100 + '%',
                size: Math.random() * 2 + 1 + 'px', dur: 2 + Math.random() * 4 + 's'
            }));
            return <div className="fixed inset-0 pointer-events-none">{stars.map(s => <div key={s.id} className="star" style={{left: s.left, top: s.top, width: s.size, height: s.size, '--dur': s.dur}}></div>)}</div>;
        };

        function App() {
            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
            }, []);

            return (
                <div className="relative">
                    <StarField />
                    <div className="watermark uppercase tracking-widest italic">Designed by Nebula Co.</div>
                    
                    {/* Hero Section */}
                    <header className="h-screen flex flex-col items-center justify-center text-center px-6">
                        <div className="reveal active">
                            <div className="text-[#C9A96E] text-[11px] tracking-[0.5em] mb-8 uppercase font-bold">Nebula Dining — Riyadh</div>
                            <h1 className="text-[100px] md:text-[180px] font-black mb-8 gold-text italic leading-none">سديم</h1>
                            <h2 className="text-2xl md:text-4xl font-light mb-12">حيثُ يلتقي الكون بطبقك</h2>
                            <div className="flex gap-6 justify-center">
                                <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-12 py-4 font-black text-xs uppercase shadow-xl shadow-[#C9A96E]/20">احجز الآن</a>
                            </div>
                        </div>
                    </header>

                    {/* Stats Section - الأرقام اللي كانت ناقصة */}
                    <section id="philosophy" className="py-40 bg-[#040310] border-y border-white/5 relative z-10">
                        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-32 items-center">
                            <div className="reveal">
                                <h2 className="text-6xl md:text-8xl font-black mb-12 italic leading-tight">ليس مجرد طعام.<br/>إنه فنٌّ يُمارس.</h2>
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">98%</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">معدل رضا الضيوف</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">2019</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">عام التأسيس</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">3</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">جوائز دولية</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">12</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">شيف عالمي</div>
                                    </div>
                                </div>
                            </div>
                            <div className="reveal glass-card aspect-[3/4] hidden md:flex items-center justify-center">
                                <span className="gold-text text-9xl font-black italic">S</span>
                            </div>
                        </div>
                    </section>

                    {/* Testimonials */}
                    <section className="py-40 px-6 max-w-6xl mx-auto text-center">
                        <h2 className="text-5xl font-black mb-20 reveal italic">قالوا عن سديم</h2>
                        <div className="grid md:grid-cols-2 gap-8">
                            <div className="reveal glass-card p-12 text-right">
                                <p className="text-xl italic opacity-80 mb-10">"كل لقمة هي قصيدة تحكي قصة عبر المجرات."</p>
                                <div className="font-bold text-[#C9A96E]">نورة المنصوري</div>
                                <div className="text-[10px] opacity-40 uppercase tracking-widest">Food Critic</div>
                            </div>
                            <div className="reveal glass-card p-12 text-right" style={{transitionDelay: '200ms'}}>
                                <p className="text-xl italic opacity-80 mb-10">"المكان ليس مجرد مطعم، بل هو رسالة فخامة."</p>
                                <div className="font-bold text-[#C9A96E]">د. فيصل الرشيدي</div>
                                <div className="text-[10px] opacity-40 uppercase tracking-widest">Entrepreneur</div>
                            </div>
                        </div>
                    </section>

                    {/* Reservation Form */}
                    <section id="reservation" className="py-40 px-6 max-w-4xl mx-auto">
                        <div className="reveal glass-card p-16">
                            <h2 className="text-5xl font-black mb-12 text-center gold-text italic">احجز رحلتك</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-10">
                                <input type="text" placeholder="الاسم" className="bg-transparent border-b border-white/10 py-4 outline-none focus:border-[#C9A96E]"/>
                                <input type="tel" placeholder="رقم الجوال" className="bg-transparent border-b border-white/10 py-4 outline-none focus:border-[#C9A96E] text-left"/>
                                <button className="md:col-span-2 bg-[#C9A96E] text-[#060412] py-6 font-black uppercase tracking-[0.5em] hover:bg-white transition-all text-xs mt-10">Confirm Reservation</button>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center opacity-20 text-[10px] tracking-[0.5em] uppercase">
                        © 2026 SADEEM NEBULA — THE ART OF DINING
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
