<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&family=Cormorant+Garamond:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * { scroll-behavior: smooth; cursor: default; }
        body { background-color: #060412; color: #fff; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        
        /* تأثير النجوم المتحركة */
        .star {
            position: absolute; border-radius: 50%; background: white;
            animation: twinkle var(--dur) ease-in-out infinite; opacity: 0.3;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        
        /* تدرج السديم */
        .nebula-gradient {
            background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(139,92,246,0.18) 0%, transparent 70%), 
                        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(201,169,110,0.12) 0%, transparent 60%);
        }

        /* دوران الحلقات المزيّنة */
        .orbit {
            position: absolute; top: 50%; left: 50%; border: 1px solid rgba(201,169,110,0.1);
            border-radius: 50%; transform: translate(-50%, -50%); animation: rotate var(--rev) linear infinite;
        }
        @keyframes rotate { from { transform: translate(-50%,-50%) rotate(0deg); } to { transform: translate(-50%,-50%) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // مكون خلفية النجوم
        const StarField = () => {
            const stars = Array.from({ length: 50 }).map((_, i) => ({
                id: i, left: Math.random() * 100, top: Math.random() * 100,
                size: Math.random() * 2 + 1, dur: 2 + Math.random() * 3
            }));
            return (
                <div className="absolute inset-0 overflow-hidden pointer-events-none">
                    {stars.map(s => (
                        <div key={s.id} className="star" style={{
                            left: `${s.left}%`, top: `${s.top}%`,
                            width: `${s.size}px`, height: `${s.size}px`,
                            '--dur': `${s.dur}s`
                        }} />
                    ))}
                </div>
            );
        };

        const MENU_ITEMS = [
            { id: 1, name: "تغريدة الصحراء", nameEn: "Desert Whisper", price: "٢٨٥", desc: "فيليه جمل مُعتَّق في نبيذ التمر، يُرافقه رغوة الزعفران الفارسي وحصاة الملح الوردي.", color: "#C9A96E", icon: "✦", tag: "الأكثر طلباً" },
            { id: 2, name: "سيمفونية التوابل", nameEn: "Spice Symphony", price: "٣٤٠", desc: "روبيان هايلاند المُدخَّن بعود العرعر، في حضن صلصة الكاري الأزرق النادر ورقائق الذهب.", color: "#8B5CF6", icon: "◈", tag: "طبق الموسم" },
            { id: 3, name: "لحظة الانهيار", nameEn: "The Collapse", price: "١٩٠", desc: "كرواسان شوكولاتة داكنة ٩٠٪ يذوب أمامك، تنبثق منه كريمة الفانيلا بوربون وعسل جبال الأطلس.", color: "#E11D48", icon: "⬡", tag: "حصري ليلاً" }
        ];

        function App() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 60);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            return (
                <div className="relative min-h-screen nebula-gradient">
                    <StarField />
                    
                    {/* Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 px-6 md:px-12 py-4 flex justify-between items-center ${scrolled ? 'bg-[#060412]/95 backdrop-blur-xl border-b border-[#C9A96E]/20' : 'bg-transparent'}`}>
                        <div className="flex flex-col">
                            <span className="text-[#C9A96E] font-black text-2xl tracking-tighter italic">سديم</span>
                            <span className="text-[9px] tracking-[0.3em] opacity-40 font-serif">NEBULA DINING</span>
                        </div>
                        <div className="hidden md:flex gap-10 text-[11px] font-bold tracking-widest opacity-60">
                            {['القائمة', 'تجربتنا', 'آراء الضيوف'].map(link => (
                                <a key={link} href={`#${link}`} className="hover:text-[#C9A96E] transition-colors">{link}</a>
                            ))}
                        </div>
                        <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-7 py-2.5 text-xs font-black hover:bg-white transition-all shadow-lg shadow-[#C9A96E]/10">احجز الآن</a>
                    </nav>

                    {/* Hero Section */}
                    <header className="relative h-screen flex flex-col items-center justify-center text-center px-4">
                        <div className="orbit w-[300px] h-[300px] md:w-[600px] md:h-[600px]" style={{'--rev': '40s'}}></div>
                        <div className="orbit w-[200px] h-[200px] md:w-[450px] md:h-[450px]" style={{'--rev': '30s', animationDirection: 'reverse'}}></div>
                        
                        <div className="z-10 mt-10">
                            <span className="text-[#C9A96E] text-[10px] tracking-[0.6em] mb-8 block opacity-70 uppercase animate-pulse">تجربة طعام خارج حدود المألوف</span>
                            <h1 className="text-8xl md:text-[140px] font-black mb-4 bg-gradient-to-b from-white via-[#E8D5B0] to-[#C9A96E] bg-clip-text text-transparent italic leading-none">سديم</h1>
                            <p className="text-sm md:text-xl font-light opacity-50 max-w-2xl mx-auto leading-relaxed font-serif tracking-widest mb-12">RIYADH — LUXURY DINING</p>
                            <div className="flex flex-col md:flex-row gap-4 justify-center items-center">
                                <a href="#menu" className="bg-[#C9A96E] text-[#060412] px-10 py-4 font-black text-sm hover:scale-105 transition-transform">استكشف القائمة</a>
                                <a href="#experience" className="border border-white/20 px-10 py-4 font-bold text-sm hover:bg-white/5 transition-all">فلسفتنا</a>
                            </div>
                        </div>
                    </header>

                    {/* Menu Section */}
                    <section id="menu" className="py-40 px-6 max-w-7xl mx-auto relative">
                        <div className="text-center mb-24">
                            <h2 className="text-5xl md:text-7xl font-black mb-6">قائمة سديم</h2>
                            <p className="opacity-40 text-sm tracking-[.2em]">ابتكارات حصرية لا تُقدّم إلا تحت سقفنا</p>
                        </div>
                        <div className="grid lg:grid-cols-3 gap-8">
                            {MENU_ITEMS.map(item => (
                                <div key={item.id} className="group p-12 bg-white/[0.02] border border-white/5 hover:border-[#C9A96E]/30 transition-all duration-700 relative overflow-hidden backdrop-blur-sm">
                                    <div className="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-30 transition-opacity text-5xl italic">{item.id}</div>
                                    <div className="text-4xl mb-8" style={{color: item.color}}>{item.icon}</div>
                                    <span className="text-[10px] text-[#C9A96E] border border-[#C9A96E]/30 px-3 py-1 mb-4 inline-block">{item.tag}</span>
                                    <h3 className="text-3xl font-bold mb-1">{item.name}</h3>
                                    <p className="text-[10px] opacity-40 font-serif mb-6 tracking-widest uppercase">{item.nameEn}</p>
                                    <p className="text-sm opacity-60 leading-relaxed mb-10 h-24">{item.desc}</p>
                                    <div className="text-4xl font-black italic" style={{color: item.color}}>{item.price} <span className="text-xs font-normal opacity-30">ر.س</span></div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/5 text-center">
                        <div className="text-[#C9A96E] font-black text-3xl italic mb-4">سديم</div>
                        <div className="flex justify-center gap-8 opacity-30 text-[10px] font-bold mb-8 tracking-widest uppercase">
                            <span>Riyadh</span> • <span>920000000</span> • <span>Instagram</span>
                        </div>
                        <p className="text-[10px] opacity-20">© ٢٠٢٦ سديم | صُممت كقطعة فنية تقنية</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
