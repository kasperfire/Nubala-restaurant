<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }
        body { background-color: #060412; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        
        /* تأثير النجوم المتلألئة */
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--dur) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        /* تدرج الذهب الخاص بالشعار والنصوص الكبيرة */
        .gold-text { background: linear-gradient(to bottom, #E8D5B0 0%, #C9A96E 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* أنيميشن الظهور عند السكرول */
        .reveal { opacity: 0; transform: translateY(50px); transition: all 1s cubic-bezier(0.17, 0.55, 0.55, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* تصميم البطاقات كما في الصورة */
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(201, 169, 110, 0.1); backdrop-filter: blur(10px); }
        
        /* خط السكرول العمودي في الهيرو */
        .scroll-line { width: 1px; height: 80px; background: linear-gradient(to bottom, #C9A96E, transparent); margin-top: 20px; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const StarField = () => {
            const stars = Array.from({ length: 80 }).map((_, i) => ({
                id: i, left: Math.random() * 100 + '%', top: Math.random() * 100 + '%',
                size: Math.random() * 2 + 1 + 'px', dur: 2 + Math.random() * 4 + 's'
            }));
            return <div className="fixed inset-0 pointer-events-none z-0">{stars.map(s => <div key={s.id} className="star" style={{left: s.left, top: s.top, width: s.size, height: s.size, '--dur': s.dur}}></div>)}</div>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
                }, { threshold: 0.1 });
                
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => { window.removeEventListener('scroll', handleScroll); observer.disconnect(); };
            }, []);

            return (
                <div className="relative">
                    <StarField />
                    
                    {/* الملاحة - Navbar */}
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 px-6 md:px-16 py-6 flex justify-between items-center ${scrolled ? 'bg-[#060412]/95 border-b border-[#C9A96E]/10 backdrop-blur-lg' : ''}`}>
                        <div className="flex flex-col">
                            <span className="gold-text font-black text-3xl italic tracking-tighter">سديم</span>
                            <span className="text-[8px] tracking-[0.4em] opacity-40 uppercase font-serif">Nebula Dining</span>
                        </div>
                        <div className="hidden md:flex gap-12 text-[10px] font-bold tracking-widest opacity-50">
                            <a href="#menu" className="hover:text-[#C9A96E] transition-colors uppercase">Menu</a>
                            <a href="#philosophy" className="hover:text-[#C9A96E] transition-colors uppercase">Philosophy</a>
                            <a href="#reservation" className="hover:text-[#C9A96E] transition-colors uppercase">Reserve</a>
                        </div>
                        <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-8 py-3 text-[10px] font-black uppercase hover:bg-white transition-all shadow-lg shadow-[#C9A96E]/20">احجز الآن</a>
                    </nav>

                    {/* قسم الهيرو - Hero (مطابق للصورة 1000127695) */}
                    <header className="relative h-screen flex flex-col items-center justify-center text-center px-6 overflow-hidden">
                        <div className="z-10 reveal active">
                            <div className="text-[#C9A96E] text-[11px] tracking-[0.6em] mb-10 block opacity-70 uppercase font-bold">Nebula Dining — Riyadh</div>
                            <h1 className="text-[100px] md:text-[180px] font-black mb-8 gold-text italic leading-[0.8]">سديم</h1>
                            <h2 className="text-2xl md:text-4xl font-light mb-12 tracking-wide">حيثُ يلتقي الكون بطبقك</h2>
                            <p className="max-w-2xl mx-auto opacity-40 text-sm md:text-base leading-loose mb-12">نُقدّم فلسفة الطعام كما لم تُقدّم من قبل — حيث كل طبق رحلة إلى مجرة مذاق لا نهاية لها.</p>
                            <div className="flex flex-col md:flex-row gap-6 justify-center items-center">
                                <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-14 py-5 font-black text-xs transition-transform hover:scale-105 shadow-2xl shadow-[#C9A96E]/20 uppercase">احجز تجربتك الآن</a>
                                <a href="#menu" className="border border-white/20 px-14 py-5 font-bold text-xs hover:bg-white/5 transition-all uppercase tracking-widest">استكشف القائمة</a>
                            </div>
                            <div className="flex flex-col items-center mt-20 opacity-30">
                                <span className="text-[9px] tracking-[0.5em] uppercase">Scroll</span>
                                <div className="scroll-line"></div>
                            </div>
                        </div>
                    </header>

                    {/* قسم القائمة - Menu (مطابق للصورة 1000127696) */}
                    <section id="menu" className="py-40 px-6 max-w-7xl mx-auto relative z-10">
                        <div className="text-center mb-32 reveal">
                            <span className="text-[#C9A96E] text-[10px] tracking-[0.5em] uppercase block mb-6">— قائمة سديم — T H E  M E N U</span>
                            <h2 className="text-6xl md:text-8xl font-black mb-8 italic">طعامٌ يُروى عنه</h2>
                            <p className="opacity-40 text-sm md:text-lg max-w-2xl mx-auto leading-relaxed italic">اخترنا لك ثلاثة أطباق من قلب قائمتنا المتجددة — ابتكارات لا تجدها على أي طاولة أخرى في العالم.</p>
                        </div>
                        <div className="grid lg:grid-cols-3 gap-12">
                            {[
                                { id: 1, name: "تغريدة الصحراء", en: "Desert Whisper", price: "285", desc: "فيليه جمل مُعتَّق في نبيذ التمر لاثنتي عشرة ساعة، يُرافقه رغوة الزعفران الفارسي وحصاة الملح الوردي من جبال الهيمالايا — تجربة توقظ حواساً لم تعلم بوجودها." },
                                { id: 2, name: "سيمفونية التوابل", en: "Spice Symphony", price: "340", desc: "روبيان هايلاند المُدخَّن بعود العرعر، في حضن صلصة الكاري الأزرق النادر ورقائق الذهب عيار 24." },
                                { id: 3, name: "لحظة الانهيار", en: "The Collapse", price: "190", desc: "كرواسان شوكولاتة داكنة 90% يذوب أمامك، تنبثق منه كريمة الفانيلا بوربون وعسل جبال الأطلس." }
                            ].map((item, i) => (
                                <div key={i} className="reveal glass-card p-14 hover:border-[#C9A96E]/50 transition-all duration-700 group relative overflow-hidden" style={{transitionDelay: `${i*200}ms`}}>
                                    <div className="absolute top-0 right-0 p-8 opacity-5 text-7xl italic font-black group-hover:opacity-10 transition-opacity">{i+1}</div>
                                    <div className="text-[#C9A96E] text-3xl mb-10">✦</div>
                                    <span className="text-[10px] text-[#C9A96E] border border-[#C9A96E]/30 px-4 py-1.5 mb-8 inline-block tracking-widest uppercase">طبق الموسم</span>
                                    <h3 className="text-4xl font-bold mb-3">{item.name}</h3>
                                    <p className="text-[10px] opacity-30 font-serif tracking-[0.3em] uppercase mb-10">{item.en}</p>
                                    <p className="text-sm opacity-50 leading-loose mb-12 h-32">{item.desc}</p>
                                    <div className="text-5xl font-black italic gold-text">{item.price} <span className="text-xs font-normal opacity-30 text-white">ر.س</span></div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* قسم الفلسفة والإحصائيات (مطابق للصور 1000127693 & 1000127694) */}
                    <section id="philosophy" className="py-40 bg-[#040310] border-y border-white/5 relative z-10 overflow-hidden">
                        <div className="max-w-7xl mx-auto px-6 grid md:grid-cols-2 gap-32 items-center">
                            <div className="reveal">
                                <span className="text-[#C9A96E] text-[11px] tracking-[0.5em] uppercase block mb-8 font-bold">O U R  P H I L O S O P H Y</span>
                                <h2 className="text-6xl md:text-8xl font-black mb-12 leading-[1.1] italic">ليس مجرد طعام.<br/>إنه فنٌّ يُمارس.</h2>
                                <p className="opacity-50 leading-loose mb-10 text-lg">في سديم، نؤمن أن تناول الطعام تجربة شاملة تمس الحواس الخمس. نعمل مع أفضل منتجي المكونات الأصيلة حول العالم، ونُجري عليها طقوس المطبخ الإبداعي الحديث.</p>
                                <p className="opacity-40 mb-16 text-sm">كل طبق لدينا يمر بـ 72 ساعة من الإعداد والتجريب قبل أن يصل إلى طاولتك.</p>
                                
                                <div className="grid grid-cols-2 gap-8">
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">98%</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">معدل رضا الضيوف</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">2019</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">عام التأسيس</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">3</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">جوائز دولية</div>
                                    </div>
                                    <div className="glass-card p-10 text-center">
                                        <div className="text-5xl font-black gold-text mb-3 tracking-tighter">12</div>
                                        <div className="text-[10px] opacity-40 uppercase tracking-[0.3em]">شيف عالمي</div>
                                    </div>
                                </div>
                            </div>
                            <div className="relative reveal hidden md:block">
                                <div className="absolute -inset-10 border border-[#C9A96E]/10 rotate-3 z-0"></div>
                                <div className="relative z-10 glass-card aspect-[3/4] flex items-center justify-center p-20">
                                    <div className="text-center">
                                        <div className="gold-text text-8xl font-black italic mb-6">S</div>
                                        <div className="text-[10px] tracking-[1em] opacity-30 uppercase">Nebula Dining</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* قسم الحجز */}
                    <section id="reservation" className="py-40 px-6 max-w-4xl mx-auto relative z-10">
                        <div className="text-center mb-20 reveal">
                            <h2 className="text-6xl font-black mb-6 italic gold-text">احجز رحلتك</h2>
                            <p className="opacity-40 tracking-[0.4em] uppercase text-[10px]">Exclusive Seating • Riyadh</p>
                        </div>
                        <form className="reveal glass-card p-16 grid grid-cols-1 md:grid-cols-2 gap-10">
                            <input type="text" placeholder="الاسم بالكامل" className="bg-transparent border-b border-white/10 py-4 focus:border-[#C9A96E] outline-none transition-all text-sm"/>
                            <input type="tel" placeholder="رقم الجوال" className="bg-transparent border-b border-white/10 py-4 focus:border-[#C9A96E] outline-none transition-all text-sm text-left"/>
                            <input type="date" className="bg-transparent border-b border-white/10 py-4 focus:border-[#C9A96E] outline-none transition-all text-sm opacity-40"/>
                            <select className="bg-transparent border-b border-white/10 py-4 focus:border-[#C9A96E] outline-none transition-all text-sm opacity-40">
                                <option className="bg-[#060412]">شخصين</option>
                                <option className="bg-[#060412]">4 أشخاص</option>
                                <option className="bg-[#060412]">طاولة VIP</option>
                            </select>
                            <button className="md:col-span-2 bg-[#C9A96E] text-[#060412] py-6 font-black uppercase tracking-[0.5em] hover:bg-white transition-all text-xs mt-10">Confirm Reservation</button>
                        </form>
                    </section>

                    <footer className="py-20 text-center border-t border-white/5">
                        <div className="gold-text font-black text-3xl italic mb-6">سديم</div>
                        <p className="text-[9px] opacity-20 tracking-[0.5em] uppercase">© 2026 SADEEM NEBULA — THE ART OF DINING</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
