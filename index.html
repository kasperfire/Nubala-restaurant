<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سديم | Nebula Dining</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { scroll-behavior: smooth; }
        body { background-color: #060412; color: white; font-family: 'Tajawal', sans-serif; overflow-x: hidden; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle var(--dur) infinite ease-in-out; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .gold-gradient { background: linear-gradient(to bottom, #C9A96E, #8A6E3D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-bg { background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%); border: 1px solid rgba(201, 169, 110, 0.1); }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const StarField = () => {
            const stars = Array.from({ length: 60 }).map((_, i) => ({
                id: i, left: Math.random() * 100 + '%', top: Math.random() * 100 + '%',
                size: Math.random() * 2 + 1 + 'px', dur: 2 + Math.random() * 3 + 's'
            }));
            return <div className="fixed inset-0 pointer-events-none">{stars.map(s => <div key={s.id} className="star" style={{left: s.left, top: s.top, width: s.size, height: s.size, '--dur': s.dur}}></div>)}</div>;
        };

        function App() {
            const [scrolled, setScrolled] = useState(false);
            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
                }, { threshold: 0.1 });
                document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
                return () => { window.removeEventListener('scroll', handleScroll); observer.disconnect(); };
            }, []);

            return (
                <div className="relative">
                    <StarField />
                    <nav className={`fixed top-0 w-full z-50 transition-all duration-500 px-6 py-4 flex justify-between items-center ${scrolled ? 'bg-[#060412]/90 backdrop-blur-md border-b border-[#C9A96E]/10' : ''}`}>
                        <div className="text-[#C9A96E] font-black text-2xl italic">سديم</div>
                        <div className="hidden md:flex gap-8 text-xs font-bold opacity-60">
                            <a href="#menu" className="hover:text-[#C9A96E]">القائمة</a>
                            <a href="#philosophy" className="hover:text-[#C9A96E]">فلسفتنا</a>
                            <a href="#reservation" className="hover:text-[#C9A96E]">احجز الآن</a>
                        </div>
                        <button className="bg-[#C9A96E] text-[#060412] px-6 py-2 text-xs font-black uppercase">Reserve</button>
                    </nav>

                    {/* Hero Section - مطابقة للصور */}
                    <header className="h-screen flex flex-col items-center justify-center text-center px-6">
                        <div className="reveal active">
                            <div className="text-[#C9A96E] text-[10px] tracking-[0.5em] mb-4 uppercase font-bold">Nebula Dining — Riyadh</div>
                            <h1 className="text-7xl md:text-[120px] font-black mb-6 gold-gradient italic leading-none">سديم</h1>
                            <h2 className="text-xl md:text-3xl font-light mb-12 opacity-80">حيثُ يلتقي الكون بطبقك</h2>
                            <p className="max-w-xl mx-auto opacity-40 text-sm leading-loose mb-10">نُقدّم فلسفة الطعام كما لم تُقدّم من قبل — حيث كل طبق رحلة إلى مجرة مذاق لا نهاية لها.</p>
                            <div className="flex gap-4 justify-center">
                                <a href="#reservation" className="bg-[#C9A96E] text-[#060412] px-10 py-4 font-black text-xs transition-transform hover:scale-105">احجز تجربتك الآن</a>
                                <a href="#menu" className="border border-white/20 px-10 py-4 font-bold text-xs hover:bg-white/5 transition-all">استكشف القائمة</a>
                            </div>
                        </div>
                    </header>

                    {/* Menu Section - مطابقة للصور */}
                    <section id="menu" className="py-32 px-6 max-w-6xl mx-auto">
                        <div className="text-center mb-20 reveal">
                            <span className="text-[#C9A96E] text-[10px] tracking-widest uppercase block mb-2">— قائمة سديم — T H E  M E N U</span>
                            <h2 className="text-5xl font-black mb-6">طعامٌ يُروى عنه</h2>
                            <p className="opacity-40 text-sm max-w-lg mx-auto">اخترنا لك ثلاثة أطباق من قلب قائمتنا المتجددة — ابتكارات لا تجدها على أي طاولة أخرى في العالم.</p>
                        </div>
                        <div className="grid md:grid-cols-3 gap-8">
                            {[
                                { id: 1, name: "تغريدة الصحراء", en: "Desert Whisper", price: "285", desc: "فيليه جمل مُعتَّق في نبيذ التمر لاثنتي عشرة ساعة، يُرافقه رغوة الزعفران الفارسي وحصاة الملح الوردي من جبال الهيمالايا — تجربة توقظ حواساً لم تعلم بوجودها." },
                                { id: 2, name: "سيمفونية التوابل", en: "Spice Symphony", price: "340", desc: "روبيان هايلاند المُدخَّن بعود العرعر، في حضن صلصة الكاري الأزرق النادر ورقائق الذهب." },
                                { id: 3, name: "لحظة الانهيار", en: "The Collapse", price: "190", desc: "كرواسان شوكولاتة داكنة 90% يذوب أمامك، تنبثق منه كريمة الفانيلا بوربون وعسل جبال الأطلس." }
                            ].map((item, i) => (
                                <div key={i} className="reveal card-bg p-10 hover:border-[#C9A96E]/50 transition-all duration-500" style={{transitionDelay: `${i*150}ms`}}>
                                    <div className="text-[10px] text-[#C9A96E] border border-[#C9A96E]/30 px-3 py-1 inline-block mb-6">طبق الموسم</div>
                                    <h3 className="text-3xl font-bold mb-2">{item.name}</h3>
                                    <p className="text-[10px] opacity-30 font-serif tracking-widest uppercase mb-6">{item.en}</p>
                                    <p className="text-sm opacity-50 leading-relaxed mb-8 h-24">{item.desc}</p>
                                    <div className="text-3xl font-black italic text-[#C9A96E]">{item.price} <span className="text-xs font-normal opacity-30">ر.س</span></div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* Philosophy Section - الأرقام التي ظهرت في الصور */}
                    <section id="philosophy" className="py-32 bg-[#040310] border-y border-white/5 relative z-10">
                        <div className="max-w-6xl mx-auto px-6 grid md:grid-cols-2 gap-20 items-center">
                            <div className="reveal">
                                <span className="text-[#C9A96E] text-[10px] tracking-widest uppercase block mb-4">O U R  P H I L O S O P H Y</span>
                                <h2 className="text-5xl font-black mb-8 leading-tight">ليس مجرد طعام.<br/>إنه فنٌّ يُمارس.</h2>
                                <p className="opacity-40 leading-loose mb-10 text-lg">في سديم، نؤمن أن تناول الطعام تجربة شاملة تمس الحواس الخمس. نعمل مع أفضل منتجي المكونات الأصيلة حول العالم، ونُجري عليها طقوس المطبخ الإبداعي الحديث.</p>
                                <p className="opacity-40 mb-12">كل طبق لدينا يمر بـ 72 ساعة من الإعداد والتجريب قبل أن يصل إلى طاولتك.</p>
                                <div className="grid grid-cols-2 gap-6">
                                    <div className="card-bg p-8 text-center"><div className="text-4xl font-black text-[#C9A96E] mb-2">2019</div><div className="text-[10px] opacity-40 uppercase tracking-widest">عام التأسيس</div></div>
                                    <div className="card-bg p-8 text-center"><div className="text-4xl font-black text-[#C9A96E] mb-2">98%</div><div className="text-[10px] opacity-40 uppercase tracking-widest">معدل رضا الضيوف</div></div>
                                    <div className="card-bg p-8 text-center"><div className="text-4xl font-black text-[#C9A96E] mb-2">12</div><div className="text-[10px] opacity-40 uppercase tracking-widest">شيف عالمي</div></div>
                                    <div className="card-bg p-8 text-center"><div className="text-4xl font-black text-[#C9A96E] mb-2">3</div><div className="text-[10px] opacity-40 uppercase tracking-widest">جوائز دولية</div></div>
                                </div>
                            </div>
                            <div className="reveal flex justify-center" style={{transitionDelay: "200ms"}}>
                                <div className="w-full aspect-[4/5] bg-gradient-to-br from-[#C9A96E]/20 to-transparent border border-[#C9A96E]/20 relative">
                                     <div className="absolute inset-0 flex items-center justify-center italic text-4xl opacity-20 font-serif">SADEEM</div>
                                </div>
                            </div>
                        </div>
                    </section>

                    <footer className="py-20 text-center opacity-30 text-[10px] tracking-[0.5em] uppercase">
                        © 2026 SADEEM NEBULA — THE ART OF DINING
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
